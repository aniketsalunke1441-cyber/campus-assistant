openenv_version: "1.0"

environment:
  name: CampusAssistantEnv
  version: "1.0.0"
  description: >
    An autonomous AI campus assistant environment where an LLM-based agent
    helps students complete college tasks such as note search, study planning,
    reminder generation, checklist creation, and quiz generation.
    The environment follows the OpenEnv specification with step(), reset(), and state() APIs.
  author: "Hackathon Team"
  license: MIT
  tags:
    - education
    - college
    - nlp
    - llm-agent
    - study-tool

observation_space:
  type: dict
  description: "Structured JSON state returned by state()"
  fields:
    user_goal:
      type: string
      description: "The goal the student wants to accomplish"
    task_name:
      type: string
      description: "Human-readable task name"
    tasks_remaining:
      type: list[string]
      description: "Steps still required to complete the task"
    completed_steps:
      type: list[string]
      description: "Steps already completed by the agent"
    tools_used:
      type: list[string]
      description: "Action types called so far in this episode"
    time_remaining:
      type: integer
      description: "Seconds remaining before episode timeout"
      range: [0, 600]
    difficulty_level:
      type: string
      enum: [easy, medium, hard]
      description: "Difficulty of the current task"
    current_reward:
      type: float
      description: "Cumulative reward so far"
      range: [0.0, 1.0]
    done:
      type: boolean
      description: "Whether the episode has finished"
    last_message:
      type: string
      description: "Informational message from the last step"
    generated_content:
      type: dict
      description: "Content generated by tools (summaries, quizzes, plans, etc.)"

action_space:
  type: discrete
  description: "Named action types the agent can invoke"
  actions:
    search_notes:
      description: "Search the knowledge base for relevant notes on a topic"
      parameters:
        topic:
          type: string
          required: false
    summarize_notes:
      description: "Summarize retrieved or existing notes"
      parameters:
        topic:
          type: string
          required: false
    create_study_plan:
      description: "Generate a structured study plan for an exam or topic"
      parameters:
        subject:
          type: string
          required: false
        hours:
          type: integer
          required: false
    generate_reminder:
      description: "Create a time-based reminder for a task or exam"
      parameters:
        event:
          type: string
          required: false
        time:
          type: string
          required: false
    create_quiz:
      description: "Generate a quiz with questions and answers on a topic"
      parameters:
        topic:
          type: string
          required: false
        num_questions:
          type: integer
          required: false
    create_checklist:
      description: "Generate a task checklist for exam preparation"
      parameters:
        topic:
          type: string
          required: false
    finish_task:
      description: "Signal that the agent believes the task is complete"

reward:
  range: [0.0, 1.0]
  description: >
    Multi-component reward with partial progress signals.
  components:
    step_completion:
      weight: 0.40
      description: "Reward for each required step completed (partial credit)"
    correct_sequence:
      weight: 0.20
      description: "Bonus for completing steps in the optimal order"
    tool_diversity:
      weight: 0.15
      description: "Bonus for using a diverse set of relevant tools"
    final_completion:
      weight: 0.20
      description: "Bonus awarded only when finish_task is called after all steps"
    time_efficiency:
      weight: 0.05
      description: "Small bonus for completing faster"

tasks:
  - id: task_easy_summarize_dbms
    name: "Summarize DBMS Notes"
    difficulty: easy
    time_limit: 120
    user_goal: >
      The student needs a concise summary of their DBMS (Database Management Systems)
      notes to quickly review key concepts before class.
    required_steps:
      - search_notes
      - summarize_notes
      - finish_task
    description: >
      Single-step summarization task. The agent must search for DBMS notes and
      produce a summary, then signal completion.

  - id: task_medium_sql_viva
    name: "Prepare for SQL Viva Tomorrow"
    difficulty: medium
    time_limit: 240
    user_goal: >
      The student has a SQL viva tomorrow and needs to search DBMS/SQL notes,
      summarize them, create a study plan, and generate a reminder.
    required_steps:
      - search_notes
      - summarize_notes
      - create_study_plan
      - generate_reminder
      - finish_task
    description: >
      Multi-step preparation task. The agent must retrieve notes, summarize them,
      build a structured study plan, set a reminder, and then finish.

  - id: task_hard_full_prep
    name: "Full 2-Hour Study Sprint"
    difficulty: hard
    time_limit: 360
    user_goal: >
      The student needs a complete 2-hour study sprint package: a structured study
      plan, a quiz to test their knowledge, a reminder for the exam, and a
      preparation checklist — all built from their notes.
    required_steps:
      - search_notes
      - summarize_notes
      - create_study_plan
      - create_quiz
      - generate_reminder
      - create_checklist
      - finish_task
    description: >
      Complex multi-tool workflow. The agent must orchestrate all available tools
      in a meaningful sequence to produce a full exam-preparation package.

deployment:
  platforms:
    - huggingface_spaces
    - docker
  ui: streamlit
  port: 7860
  entrypoint: "app.py"
