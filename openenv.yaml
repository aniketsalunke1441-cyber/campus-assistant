# ──────────────────────────────────────────────────────────────────
# CampusAssistantEnv — OpenEnv Metadata Specification
# ──────────────────────────────────────────────────────────────────

name: CampusAssistantEnv
version: 1.0.0
description: Autonomous AI Assistant for University Tasks (notes, plans, quizzes, reminders)
difficulty: easy|medium|hard
max_steps: 20
reward_range: [0.0, 1.0]

tasks:
  - id: campus_easy
    difficulty: easy
    grader: true
  - id: campus_medium
    difficulty: medium
    grader: true
  - id: campus_hard
    difficulty: hard
    grader: true

api:
  type: rest_api
  port: 8000
  host: 0.0.0.0
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    health: GET /health

state_schema:
  goal: string
  tasks_remaining: integer
  completed_steps: integer
  difficulty: string
  last_message: string
  current_reward: float
  done: boolean

required_actions:
  - search_notes
  - summarize_notes
  - create_study_plan
  - create_quiz
  - generate_reminder
  - create_checklist
  - finish_task
