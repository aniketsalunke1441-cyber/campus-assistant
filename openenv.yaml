version: "1.0"
name: CampusAssistantEnv
description: Autonomous AI Assistant for University Tasks (notes, plans, quizzes, reminders)
max_steps: 20
reward_range: [0.0, 1.0]

tasks:
  - id: summarize_notes
    description: "Search DBMS notes and generate a summary."
    difficulty: easy
    grader: tasks.grade_summarize_notes

  - id: prepare_viva
    description: "Prepare for a viva exam with a study plan and quiz."
    difficulty: medium
    grader: tasks.grade_prepare_viva

  - id: complete_study_workflow
    description: "Complete the full study workflow with plan, quiz, checklist and reminder."
    difficulty: hard
    grader: tasks.grade_complete_study_workflow

api:
  type: rest_api
  port: 8000
  host: 0.0.0.0
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    health: GET /health

state_schema:
  task_name: string
  user_goal: string
  tasks_remaining: list
  completed_steps: list
  difficulty_level: string
  last_message: string
  current_reward: float
  done: boolean

required_actions:
  - search_notes
  - summarize_notes
  - create_study_plan
  - create_quiz
  - generate_reminder
  - create_checklist
  - finish_task
