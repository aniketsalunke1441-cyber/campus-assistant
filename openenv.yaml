version: "1.0"
name: CampusAssistantEnv
description: Autonomous AI Assistant for University Tasks (notes, plans, quizzes, reminders)
difficulty: easy|medium|hard
max_steps: 20
reward_range: [0.0, 1.0]

tasks:
  - id: campus_easy
    description: "Complete a simple study session on DBMS"
    grader: true
    difficulty: easy
  - id: campus_medium
    description: "Prepare for an exam with a study plan and quiz"
    grader: true
    difficulty: medium
  - id: campus_hard
    description: "Full exam preparation with checklist and reminders"
    grader: true
    difficulty: hard

api:
  type: rest_api
  port: 8000
  host: 0.0.0.0
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    health: GET /health

state_schema:
  task_name: string
  user_goal: string
  tasks_remaining: string[]
  completed_steps: string[]
  difficulty_level: string
  last_message: string
  current_reward: float
  done: boolean

required_actions:
  - search_notes
  - summarize_notes
  - create_study_plan
  - create_quiz
  - generate_reminder
  - create_checklist
  - finish_task
